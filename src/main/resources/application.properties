# Database credentials come from environment variables — never commit real values.
# The previously committed RDS password is compromised (it lives in git history)
# and must be rotated before that database is used again.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mysqldb?sslMode=REQUIRED}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=mysqldb

# Spring Security protects all endpoints with HTTP Basic auth.
# By default a random password is generated and printed to the log on startup.
# To set fixed credentials, export SPRING_SECURITY_USER_NAME and
# SPRING_SECURITY_USER_PASSWORD as environment variables.
